<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRC Private Chat</title>
    <!-- CSS for WhatsApp Look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Gun.js for Real-time Sync (No Database needed) -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
</head>
<body class="bg-[#e5ddd5] h-screen flex flex-col font-sans">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-[#f0f2f5] z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-center mb-6">
                <div class="bg-green-500 p-4 rounded-full text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">BRC Messaging</h2>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Username" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="login()" class="w-full bg-[#25d366] hover:bg-[#128c7e] text-white p-3 rounded-lg font-bold transition duration-200">Login</button>
                <p id="error" class="text-red-500 text-sm hidden text-center italic font-semibold">Invalid credentials!</p>
            </div>
        </div>
    </div>

    <!-- Main Chat UI -->
    <header class="bg-[#075e54] text-white p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center text-black font-bold">BRC</div>
            <div>
                <h1 class="font-bold leading-tight">Central Server</h1>
                <p class="text-[10px] text-green-300">online</p>
            </div>
        </div>
        <div id="user-display" class="text-xs font-mono opacity-80"></div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2">
        <!-- Messages appear here -->
    </main>

    <footer class="bg-[#f0f2f5] p-3 flex items-center gap-2">
        <input id="msg-input" type="text" placeholder="Type a message" class="flex-1 p-3 rounded-full border-none focus:outline-none text-sm">
        <button onclick="sendMessage()" class="bg-[#075e54] text-white p-3 rounded-full hover:bg-[#128c7e]">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </footer>

    <script>
        // Your specific credentials
        const credentials = {
            "debubrc": "wap5brc",
            "ayushclw": "wap7clw",
            "sarthababawag9": "wag9clw"
        };

        // Initialize Gun.js using public relay peers (helps with cross-location sync)
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://libros-p2p-node.herokuapp.com/gun'
        ]);
        const chat = gun.get('brc_central_chat_2024'); // Unique channel name

        let currentUser = "";

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();

            if (credentials[u] && credentials[u] === p) {
                currentUser = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('user-display').innerText = u;
                initChat();
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function initChat() {
            // Listen for new messages
            chat.map().on((data, id) => {
                if (data && data.content) {
                    renderMessage(data);
                }
            });
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!content) return;

            // Save to Gun.js
            chat.set({
                sender: currentUser,
                content: content,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now()
            });

            input.value = '';
        }

        function renderMessage(msg) {
            const box = document.getElementById('chat-box');
            const isMe = msg.sender === currentUser;
            
            const div = document.createElement('div');
            div.className = `max-w-[75%] p-2 rounded-lg shadow-sm relative mb-2 ${isMe ? 'bg-[#dcf8c6] self-end rounded-tr-none' : 'bg-white self-start rounded-tl-none'}`;
            
            div.innerHTML = `
                <p class="text-[10px] font-bold ${isMe ? 'text-green-700' : 'text-blue-600'}">${msg.sender}</p>
                <p class="text-[14px] text-gray-800 pr-10">${msg.content}</p>
                <span class="text-[9px] text-gray-500 absolute bottom-1 right-2">${msg.time}</span>
            `;
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Allow 'Enter' key to send
        document.getElementById('msg-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
    </html>
