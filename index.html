<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>TAIWRC | FULL_SCREEN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #ece5dd; margin: 0; padding: 0; }
        /* Fix for mobile "sandwich" overlap */
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .wa-teal { background-color: #075e54; }
        .wa-chat-bg { 
            flex: 1;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-repeat: repeat;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble { max-width: 85%; padding: 6px 10px; border-radius: 8px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); min-width: 80px; }
        .sent { align-self: flex-end; background-color: #dcf8c6; border-top-right-radius: 0; }
        .received { align-self: flex-start; background-color: #ffffff; border-top-left-radius: 0; }
        .input-area { background-color: #f0f0f0; padding: 8px; display: flex; items-center: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="login-box" class="fixed inset-0 z-[200] wa-teal flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-lg p-8 shadow-2xl">
            <h1 class="text-2xl font-bold text-center text-teal-900 mb-6">TAIWRC LOGIN</h1>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="UNIT_ID" class="w-full p-3 border-b-2 border-teal-600 outline-none uppercase">
                <input id="password" type="password" placeholder="KEY_CODE" class="w-full p-3 border-b-2 border-teal-600 outline-none">
                <button onclick="login()" class="w-full bg-green-600 text-white py-3 rounded font-bold uppercase tracking-widest">Connect</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden app-container">
        <header class="wa-teal p-3 text-white flex justify-between items-center z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-300 rounded-full flex items-center justify-center text-teal-900">
                    <i class="fa-solid fa-train"></i>
                </div>
                <div>
                    <h2 class="font-bold text-sm">TAIWRC CREW</h2>
                    <p id="status-text" class="text-[10px] opacity-80 italic">Connecting...</p>
                </div>
            </div>
            <div class="flex gap-4 opacity-80">
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-phone"></i>
            </div>
        </header>

        <main id="chat-box" class="wa-chat-bg">
            <div class="bg-blue-100 text-[10px] text-center p-1 rounded shadow-sm mx-auto mb-2 w-3/4 border border-blue-200">
                Network: SECR/ER/SER Active
            </div>
        </main>

        <footer class="input-area">
            <div class="flex-1 bg-white rounded-full px-4 py-2 flex items-center shadow-sm">
                <input id="chat-input" type="text" placeholder="Type a message" class="flex-1 outline-none text-sm bg-transparent">
            </div>
            <button onclick="sendMessage()" class="bg-[#128c7e] w-11 h-11 rounded-full flex items-center justify-center text-white shadow-md">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </footer>
    </div>

    <script>
        const database = { "Debpratim-debukakawap5": "debu-wap5brc", "ayushwap7": "wap7clw", "sarthababawag9": "wag9clw" };
        let currentUser = "";
        let pubnub;

        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if (database[u] === p) {
                currentUser = u.split('-')[0].toUpperCase();
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initPubNub();
                Notification.requestPermission();
            } else { alert("INVALID_ID"); }
        }

        function initPubNub() {
            pubnub = new PubNub({
                publishKey: 'pub-c-4933a39e-d710-4318-9749-366a01490983',
                subscribeKey: 'sub-c-572f10b8-c399-4c70-96f3-138374a5893d',
                userId: currentUser
            });
            pubnub.subscribe({ channels: ['taiwrc_full_v46'] });
            pubnub.addListener({
                message: (m) => {
                    if (m.publisher !== currentUser) {
                        renderMessage(m.message, false);
                        if (Notification.permission === "granted") {
                            new Notification(`TAIWRC: ${m.message.user}`, { body: m.message.text });
                        }
                    }
                }
            });
            document.getElementById('status-text').innerText = "online";
        }

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            const msg = { user: currentUser, text: inp.value, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) };
            renderMessage(msg, true);
            pubnub.publish({ channel: 'taiwrc_full_v46', message: msg });
            inp.value = "";
        }

        function renderMessage(data, isMe) {
            const box = document.getElementById('chat-box');
            const html = `
                <div class="message-bubble ${isMe ? 'sent' : 'received'}">
                    ${!isMe ? `<p class="text-[9px] font-bold text-teal-700 uppercase">${data.user}</p>` : ''}
                    <p class="text-[14px] text-gray-900">${data.text}</p>
                    <p class="text-[8px] text-gray-500 text-right mt-1">${data.time} ${isMe ? '✓✓' : ''}</p>
                </div>`;
            box.insertAdjacentHTML('beforeend', html);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
