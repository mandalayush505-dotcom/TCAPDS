<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>TAIWRC | v160 FINAL</title>
    <style>
        :root { --wa-teal: #075e54; --wa-bg: #e5ddd5; }
        body { margin:0; background:var(--wa-bg); height:100dvh; display:flex; flex-direction:column; overflow:hidden; font-family:'Segoe UI', sans-serif; }
        
        /* THE CHAT ENGINE VIEWPORT */
        #viewport { 
            flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* WHATSAPP BUBBLE ARCHITECTURE */
        .msg { max-width:80%; padding:8px 12px; border-radius:10px; font-size:15px; position:relative; box-shadow:0 1px 2px rgba(0,0,0,0.15); line-height:1.4; }
        .sent { align-self:flex-end; background:#dcf8c6; border-top-right-radius:0; }
        .recv { align-self:flex-start; background:#ffffff; border-top-left-radius:0; }
        
        .sender-tag { font-size:11px; font-weight:900; text-transform:uppercase; margin-bottom:2px; display:block; }
        .time-tag { font-size:10px; color:#888; text-align:right; margin-top:4px; display:flex; justify-content:flex-end; align-items:center; gap:3px; }

        /* PRE-LOADER & OVERLAYS */
        #overlay { position:fixed; inset:0; z-index:999; background:var(--wa-teal); display:flex; align-items:center; justify-content:center; flex-direction:column; }
        .led { width:12px; height:12px; rounded-full; transition: 0.3s; }
        .led-red { background:#ff4444; box-shadow: 0 0 10px #ff4444; }
        .led-green { background:#00ff88; box-shadow: 0 0 10px #00ff88; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="bg-white p-10 rounded-[40px] w-[90%] max-w-[400px] shadow-2xl text-center">
            <h1 class="text-3xl font-black text-teal-900 mb-2 italic">TAIWRC</h1>
            <p class="text-[10px] tracking-widest text-teal-600 font-bold mb-8 uppercase">Permanent Protocol v160</p>
            <input id="user-in" type="text" placeholder="IDENTITY" class="w-full p-4 border-b-2 border-gray-100 outline-none uppercase font-bold mb-4 text-center">
            <input id="key-in" type="password" placeholder="SECURITY KEY" class="w-full p-4 border-b-2 border-gray-100 outline-none text-center mb-8">
            <button onclick="Engine.start()" class="w-full bg-teal-800 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Link Satellite</button>
        </div>
    </div>

    <div id="main-ui" class="hidden h-full flex flex-col">
        <header class="bg-[#075E54] p-4 text-white flex justify-between items-center shadow-lg z-50">
            <div class="flex items-center gap-3">
                <div id="status-led" class="led led-red rounded-full"></div>
                <div>
                    <h2 class="text-xs font-black uppercase tracking-wider">Cloud Network</h2>
                    <p id="conn-label" class="text-[9px] opacity-70">DISCONNECTED</p>
                </div>
            </div>
            <div id="my-name" class="text-[10px] font-mono bg-black/20 px-3 py-1 rounded-full border border-white/10 uppercase italic">---</div>
        </header>

        <main id="viewport"></main>

        <footer class="p-3 bg-[#f0f0f0] flex items-center gap-3 border-top border-gray-300">
            <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 bg-white rounded-full px-5 py-3 outline-none text-sm shadow-inner border border-gray-200">
            <button onclick="Engine.broadcast()" class="bg-[#128c7e] w-12 h-12 rounded-full flex items-center justify-center text-white shadow-xl active:scale-90 transition-all">
                <i class="fa-solid fa-paper-plane text-lg"></i>
            </button>
        </footer>
    </div>

    <script>
        /**
         * TAIWRC V160 ENGINE - THE PERMANENT RECORD
         * Uses Storage & Playback to ensure messages are never lost.
         */
        const Engine = {
            db: { "Debpratim-debukakawap5": "debu-wap5brc", "ayushwap7": "wap7clw", "sarthababawag9": "wag9clw" },
            colors: { "DEBPRATIM": "#d32f2f", "SARTHAK": "#1976d2", "AYUSH": "#2e7d32" },
            me: "",
            pb: null,
            chan: "taiwrc_permanent_v160",

            start() {
                const u = document.getElementById('user-in').value.trim();
                const k = document.getElementById('key-in').value.trim();
                if (this.db[u] === k) {
                    this.me = u.split('-')[0].toUpperCase();
                    document.getElementById('overlay').remove();
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('my-name').innerText = this.me;
                    this.initCloud();
                } else { alert("ACCESS DENIED"); }
            },

            initCloud() {
                this.pb = new PubNub({
                    publishKey: 'pub-c-4933a39e-d710-4318-9749-366a01490983',
                    subscribeKey: 'sub-c-572f10b8-c399-4c70-96f3-138374a5893d',
                    userId: this.me + "_" + Math.random().toString(36).substr(2, 5),
                    ssl: true,
                    heartbeatInterval: 10
                });

                this.pb.subscribe({ channels: [this.chan] });

                this.pb.addListener({
                    status: (s) => {
                        const led = document.getElementById('status-led');
                        const label = document.getElementById('conn-label');
                        if (s.category === "PNConnectedCategory") {
                            led.className = "led led-green rounded-full";
                            label.innerText = "SATELLITE ACTIVE";
                            this.pullHistory(); // CRITICAL: Get messages forever
                        } else {
                            led.className = "led led-red rounded-full";
                            label.innerText = "RECONNECTING...";
                        }
                    },
                    message: (m) => {
                        if (m.message.s !== this.me) this.render(m.message, false);
                    }
                });
            },

            async pullHistory() {
                // This is why Sarthak will see your messages forever.
                // It fetches the last 100 messages from the cloud storage.
                try {
                    const res = await this.pb.fetchMessages({ channels: [this.chan], count: 100 });
                    if (res.channels[this.chan]) {
                        document.getElementById('viewport').innerHTML = ""; // Refresh view
                        res.channels[this.chan].forEach(h => {
                            this.render(h.message, h.message.s === this.me);
                        });
                    }
                } catch (e) { console.error("History fetch failed", e); }
            },

            broadcast() {
                const input = document.getElementById('msg-input');
                const val = input.value.trim();
                if (!val) return;

                const packet = {
                    s: this.me,
                    t: val,
                    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
                    id: Date.now() + Math.random()
                };

                // WhatsApp Logic: 1. Show it instantly 2. Save it to cloud forever
                this.render(packet, true);
                this.pb.publish({ 
                    channel: this.chan, 
                    message: packet,
                    storeInHistory: true // FORCE PERMANENCE
                });
                
                input.value = "";
            },

            render(data, isMe) {
                if (document.getElementById(data.id)) return; // Prevent duplicates

                const view = document.getElementById('viewport');
                const color = this.colors[data.s] || "#000";
                
                const div = document.createElement('div');
                div.id = data.id;
                div.className = `msg ${isMe ? 'sent' : 'recv'}`;
                div.innerHTML = `
                    ${!isMe ? `<span class="sender-tag" style="color:${color}">${data.s}</span>` : ''}
                    <div>${data.t}</div>
                    <div class="time-tag">
                        ${data.time} 
                        ${isMe ? '<i class="fa-solid fa-check-double text-blue-500 ml-1"></i>' : ''}
                    </div>
                `;
                
                view.appendChild(div);
                view.scrollTop = view.scrollHeight;
            }
        };

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') Engine.broadcast(); });
    </script>
</body>
</html>
