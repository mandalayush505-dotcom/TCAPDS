<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>TAIWRC | ARCHIVE ULTIMATE</title>
    <style>
        :root { --wa-teal: #075e54; --wa-bg: #e5ddd5; --wa-dark: #128c7e; }
        body { margin:0; background:var(--wa-bg); height:100dvh; display:flex; flex-direction:column; overflow:hidden; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #chat-flow { 
            flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-attachment: fixed;
        }

        .bubble { 
            max-width:85%; padding:9px 13px; border-radius:12px; font-size:15px; 
            position:relative; box-shadow:0 1.5px 2px rgba(0,0,0,0.15); 
            animation: pop 0.2s ease-out;
        }
        @keyframes pop { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        
        .sent { align-self:flex-end; background:#dcf8c6; border-top-right-radius:0; }
        .recv { align-self:flex-start; background:#ffffff; border-top-left-radius:0; }
        
        .id-label { font-size:11px; font-weight:900; text-transform:uppercase; margin-bottom:3px; display:block; letter-spacing: 0.5px; }
        .meta-data { font-size:10px; color:#7a7a7a; text-align:right; margin-top:5px; display:flex; justify-content:flex-end; align-items:center; gap:4px; }

        #login-shield { position:fixed; inset:0; z-index:1000; background:var(--wa-teal); display:flex; align-items:center; justify-content:center; }
        .status-dot { width:12px; height:12px; border-radius:50%; border: 2px solid rgba(255,255,255,0.3); }
        .online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .offline { background: #f87171; box-shadow: 0 0 10px #f87171; }
    </style>
</head>
<body>

    <div id="login-shield">
        <div class="bg-white p-10 rounded-[45px] w-[90%] max-w-[420px] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-teal-950 mb-2 tracking-tighter italic">TAIWRC</h1>
            <p class="text-[11px] tracking-[0.4em] text-teal-600 font-bold mb-10 uppercase">Ultimate Archive v2026</p>
            
            <div class="space-y-4">
                <input id="user-id" type="text" placeholder="STATION ID" class="w-full p-4 bg-gray-50 rounded-2xl outline-none uppercase font-bold text-center border-2 border-transparent focus:border-teal-500 transition-all">
                <input id="pass-key" type="password" placeholder="SECURITY KEY" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-center border-2 border-transparent focus:border-teal-500 transition-all">
                <button onclick="App.boot()" class="w-full bg-teal-800 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-teal-700 active:scale-95 transition-all mt-4">Initiate Link</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden h-full flex flex-col">
        <header class="bg-[#075E54] p-5 text-white flex justify-between items-center shadow-2xl z-50">
            <div class="flex items-center gap-4">
                <div id="indicator" class="status-dot offline"></div>
                <div>
                    <h2 class="text-sm font-black uppercase tracking-widest">Global Terminal</h2>
                    <p id="status-text" class="text-[9px] opacity-80 font-bold uppercase">Establishing Connection...</p>
                </div>
            </div>
            <div id="my-badge" class="text-[10px] font-mono bg-black/30 px-4 py-2 rounded-xl border border-white/20 uppercase font-black tracking-widest">---</div>
        </header>

        <main id="chat-flow"></main>

        <footer class="p-4 bg-[#f0f0f0] flex items-center gap-3 border-t border-gray-300">
            <input id="msg-input" type="text" placeholder="Transmit message..." class="flex-1 bg-white rounded-full px-6 py-4 outline-none text-sm shadow-md border border-gray-200 focus:ring-2 focus:ring-teal-500">
            <button onclick="App.publish()" class="bg-[#128c7e] w-14 h-14 rounded-full flex items-center justify-center text-white shadow-2xl active:scale-90 transition-all">
                <i class="fa-solid fa-paper-plane text-xl"></i>
            </button>
        </footer>
    </div>

    <script>
        const App = {
            // CENTRAL REGISTRY
            registry: { 
                "Debpratim-debukakawap5": "debu-wap5brc", 
                "ayushwap7": "wap7clw", 
                "sarthababawag9": "wag9clw" 
            },
            
            // ZONE COLORS
            colors: { "DEBPRATIM": "#b71c1c", "SARTHAK": "#0d47a1", "AYUSH": "#1b5e20" },
            
            me: "", 
            network: null, 
            channel: "taiwrc_ultimate_forever_v1",

            boot() {
                const id = document.getElementById('user-id').value.trim();
                const key = document.getElementById('pass-key').value.trim();
                
                if (this.registry[id] === key) {
                    this.me = id.split('-')[0].toUpperCase();
                    document.getElementById('login-shield').remove();
                    document.getElementById('app-ui').classList.remove('hidden');
                    document.getElementById('my-badge').innerText = this.me;
                    this.connect();
                } else {
                    alert("ACCESS DENIED: Credentials Invalid.");
                }
            },

            connect() {
                this.network = new PubNub({
                    publishKey: 'pub-c-4933a39e-d710-4318-9749-366a01490983',
                    subscribeKey: 'sub-c-572f10b8-c399-4c70-96f3-138374a5893d',
                    userId: this.me + "_" + Math.random().toString(36).substr(2, 6),
                    ssl: true,
                    heartbeatInterval: 10
                });

                this.network.subscribe({ channels: [this.channel] });

                this.network.addListener({
                    status: (s) => {
                        const led = document.getElementById('indicator');
                        const txt = document.getElementById('status-text');
                        if (s.category === "PNConnectedCategory") {
                            led.className = "status-dot online";
                            txt.innerText = "Satellite Link Active";
                            this.fetchAllHistory(); // INFINITE FETCH
                        } else {
                            led.className = "status-dot offline";
                            txt.innerText = "Searching for Signal...";
                            setTimeout(() => this.network.reconnect(), 3000);
                        }
                    },
                    message: (m) => {
                        if (m.message.sender !== this.me) this.render(m.message, false);
                    }
                });
            },

            async fetchAllHistory() {
                try {
                    // Pulls last 100 as primary, can be looped for thousands
                    const res = await this.network.fetchMessages({ 
                        channels: [this.channel], 
                        count: 100,
                        includeMessageActions: true 
                    });
                    
                    if (res.channels[this.channel]) {
                        const flow = document.getElementById('chat-flow');
                        flow.innerHTML = ""; // Clear for full sync
                        res.channels[this.channel].forEach(item => {
                            this.render(item.message, item.message.sender === this.me);
                        });
                    }
                } catch (e) {
                    console.error("Archive Pull Failed", e);
                }
            },

            publish() {
                const input = document.getElementById('msg-input');
                const content = input.value.trim();
                if (!content) return;

                const packet = {
                    sender: this.me,
                    text: content,
                    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
                    mid: "ID-" + Date.now()
                };

                // OPTIMISTIC UI: Show instantly
                this.render(packet, true);
                
                // CLOUD PERMANENCE
                this.network.publish({ 
                    channel: this.channel, 
                    message: packet,
                    storeInHistory: true 
                });
                
                input.value = "";
            },

            render(data, isMe) {
                if (document.getElementById(data.mid)) return;

                const flow = document.getElementById('chat-flow');
                const color = this.colors[data.sender] || "#444";
                
                const div = document.createElement('div');
                div.id = data.mid;
                div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
                div.innerHTML = `
                    ${!isMe ? `<span class="id-label" style="color:${color}">${data.sender}</span>` : ''}
                    <div class="content">${data.text}</div>
                    <div class="meta-data">
                        ${data.time} 
                        ${isMe ? '<i class="fa-solid fa-check-double text-blue-500 ml-1"></i>' : ''}
                    </div>
                `;
                
                flow.appendChild(div);
                flow.scrollTop = flow.scrollHeight;
            }
        };

        // Event Listeners
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') App.publish(); });
    </script>
</body>
</html>
