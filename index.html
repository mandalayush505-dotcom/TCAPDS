<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>TAIWRC | PROTOCOL-X</title>
    <style>
        :root { --wa-teal: #075e54; --wa-bg: #e5ddd5; }
        body { margin:0; background:var(--wa-bg); height:100dvh; display:flex; flex-direction:column; font-family:'Segoe UI', sans-serif; overflow:hidden; }
        #chat-flow { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble { max-width:85%; padding:8px 12px; border-radius:10px; font-size:14.5px; box-shadow:0 1px 2px rgba(0,0,0,0.1); position:relative; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .sent { align-self:flex-end; background:#dcf8c6; border-top-right-radius:0; }
        .recv { align-self:flex-start; background:#ffffff; border-top-left-radius:0; }
        .status-meta { font-size:10px; color:#888; text-align:right; margin-top:4px; display:flex; justify-content:flex-end; gap:3px; }
        #auth-screen { position:fixed; inset:0; z-index:999; background:var(--wa-teal); display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="bg-white p-10 rounded-3xl w-full max-w-sm shadow-2xl m-4">
            <h1 class="text-2xl font-black text-center text-teal-900 mb-8 tracking-tight">PROTOCOL-X</h1>
            <input id="user-id" type="text" placeholder="ID" class="w-full p-4 border-b-2 border-teal-600 outline-none uppercase text-center font-bold mb-4">
            <input id="pass-key" type="password" placeholder="KEY" class="w-full p-4 border-b-2 border-teal-600 outline-none text-center mb-8">
            <button onclick="App.init()" class="w-full bg-teal-800 text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Connect to Node</button>
        </div>
    </div>

    <div id="app-shell" class="hidden h-full flex flex-col">
        <header class="bg-[#075E54] p-4 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <div id="conn-led" class="w-3 h-3 bg-red-600 rounded-full border border-white/20"></div>
                <span class="font-bold text-xs tracking-widest uppercase">TAIWRC CLOUD</span>
            </div>
            <div id="me-tag" class="text-[10px] font-mono bg-black/20 px-3 py-1 rounded-full border border-white/10 uppercase">---</div>
        </header>

        <main id="chat-flow"></main>

        <footer class="p-3 bg-[#f0f0f0] flex items-center gap-2">
            <input id="msg-field" type="text" placeholder="Type a message..." class="flex-1 bg-white rounded-full px-5 py-3 outline-none text-sm shadow-inner">
            <button onclick="App.transmit()" class="bg-[#128c7e] w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg active:scale-90 transition-transform">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <script>
        const App = {
            creds: { "Debpratim-debukakawap5": "debu-wap5brc", "ayushwap7": "wap7clw", "sarthababawag9": "wag9clw" },
            colors: { "DEBPRATIM": "#c62828", "SARTHAK": "#1565c0", "AYUSH": "#2e7d32" },
            me: "",
            node: null,
            channel: "taiwrc_x_final",

            init() {
                const u = document.getElementById('user-id').value.trim();
                const p = document.getElementById('pass-key').value.trim();
                if (this.creds[u] === p) {
                    this.me = u.split('-')[0].toUpperCase();
                    document.getElementById('auth-screen').remove();
                    document.getElementById('app-shell').classList.remove('hidden');
                    document.getElementById('me-tag').innerText = this.me;
                    this.boot();
                } else { alert("ACCESS REVOKED"); }
            },

            boot() {
                this.node = new PubNub({
                    publishKey: 'pub-c-4933a39e-d710-4318-9749-366a01490983',
                    subscribeKey: 'sub-c-572f10b8-c399-4c70-96f3-138374a5893d',
                    userId: this.me + "_" + Date.now(),
                    ssl: true
                });

                this.node.subscribe({ channels: [this.channel] });

                this.node.addListener({
                    status: (s) => {
                        if (s.category === "PNConnectedCategory") {
                            document.getElementById('conn-led').style.backgroundColor = "#22c55e";
                            this.fetch();
                        }
                    },
                    message: (msg) => {
                        if (msg.message.sender !== this.me) this.render(msg.message, false);
                    }
                });

                // Emergency Local Recovery
                this.syncLocal();
            },

            async fetch() {
                const history = await this.node.fetchMessages({ channels: [this.channel], count: 50 });
                if (history.channels[this.channel]) {
                    document.getElementById('chat-flow').innerHTML = ""; // Clear for sync
                    history.channels[this.channel].forEach(h => this.render(h.message, h.message.sender === this.me));
                }
            },

            transmit() {
                const input = document.getElementById('msg-field');
                const val = input.value.trim();
                if (!val) return;

                const packet = {
                    sender: this.me,
                    text: val,
                    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
                    uid: Date.now()
                };

                // 1. WhatsApp Logic: Save to local storage FIRST
                this.store(packet);
                // 2. Render immediately
                this.render(packet, true);
                // 3. Send to server
                this.node.publish({ channel: this.channel, message: packet });
                
                input.value = "";
            },

            store(p) {
                let cache = JSON.parse(localStorage.getItem('x_cache')) || [];
                cache.push(p);
                localStorage.setItem('x_cache', JSON.stringify(cache.slice(-50)));
            },

            syncLocal() {
                const cache = JSON.parse(localStorage.getItem('x_cache')) || [];
                if (cache.length > 0) {
                    cache.forEach(p => this.render(p, p.sender === this.me));
                }
            },

            render(data, isMe) {
                const flow = document.getElementById('chat-flow');
                // Prevent duplicate rendering of same message ID
                if (document.getElementById(`msg-${data.uid}`)) return;

                const color = this.colors[data.sender] || "#000";
                const div = document.createElement('div');
                div.id = `msg-${data.uid}`;
                div.className = `bubble ${isMe ? 'sent' : 'recv'}`;
                div.innerHTML = `
                    ${!isMe ? `<span class="font-bold text-[11px]" style="color:${color}">${data.sender}</span>` : ''}
                    <div>${data.text}</div>
                    <div class="status-meta">${data.time} ${isMe ? '✓✓' : ''}</div>
                `;
                flow.appendChild(div);
                flow.scrollTop = flow.scrollHeight;
            }
        };

        document.getElementById('msg-field').addEventListener('keypress', (e) => { if(e.key === 'Enter') App.transmit(); });
    </script>
</body>
</html>
